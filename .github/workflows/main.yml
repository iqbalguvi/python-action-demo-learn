name: Python Install Demo

on:
  workflow_dispatch:

jobs:
  python-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: action/checkout@v4
      - name: Install Python 3.11
        uses: action/setup-python@v5
        with:
          python-version:'3.11'

      - name: checkout python version
        run: python --version

      -  name: Run python File
         run: python app.py
